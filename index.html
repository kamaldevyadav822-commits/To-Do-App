<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8"/>

  <!-- MOBILE RESPONSIVE -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <!-- PWA -->
  <meta name="theme-color" content="#111827"/>

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  />

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  />

  <meta
    name="apple-mobile-web-app-title"
    content="Todo App"
  />

  <link rel="manifest" href="/manifest.json"/>

  <link
    rel="apple-touch-icon"
    href="/icons/icon-192.png"
  />

  <title>Professional Todo App</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html{
      touch-action: manipulation;
      scroll-behavior:smooth;
    }

    body{

      font-family:Arial,sans-serif;

      min-height:100vh;

      overflow-x:hidden;

      background:
      linear-gradient(
        135deg,
        #0f172a,
        #111827,
        #1e293b
      );

      display:flex;
      justify-content:center;
      align-items:center;

      padding:15px;

      color:white;

    }

    /* BACKGROUND */

    .bg-blur{

      position:fixed;

      width:280px;
      height:280px;

      background:#2563eb;

      border-radius:50%;

      filter:blur(120px);

      opacity:0.35;

      top:-100px;
      left:-90px;

      animation:float 8s ease-in-out infinite;

      z-index:0;

    }

    @keyframes float{

      0%,100%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(25px);
      }

    }

    /* APP */

    .todo-app{

      width:100%;
      max-width:500px;

      background:rgba(255,255,255,0.08);

      border:1px solid rgba(255,255,255,0.12);

      backdrop-filter:blur(12px);

      border-radius:25px;

      padding:20px;

      position:relative;

      z-index:2;

      box-shadow:
      0 12px 35px rgba(0,0,0,0.35);

    }

    /* INSTALL BUTTON */

    .install-btn{

      position:absolute;

      top:18px;
      right:18px;

      border:none;
      outline:none;

      padding:10px 14px;

      border-radius:14px;

      background:
      linear-gradient(
        135deg,
        #2563eb,
        #1d4ed8
      );

      color:white;

      font-size:13px;
      font-weight:bold;

      cursor:pointer;

      display:none;

      transition:0.3s;

      box-shadow:
      0 6px 18px rgba(37,99,235,0.35);

      z-index:5;

    }

    .install-btn:hover{

      transform:translateY(-2px);

    }

    .install-btn:active{

      transform:scale(0.95);

    }

    /* TITLE */

    .title{

      text-align:center;

      font-size:28px;

      font-weight:bold;

      margin-bottom:20px;

      letter-spacing:1px;

      margin-top:20px;

    }

    /* INPUT AREA */

    .input-area{

      display:flex;

      flex-direction:column;

      gap:12px;

      margin-bottom:20px;

    }

    .task-input{

      width:100%;

      padding:16px;

      border:none;
      outline:none;

      border-radius:16px;

      background:
      rgba(255,255,255,0.10);

      color:white;

      font-size:16px;

      transition:0.3s;

    }

    .task-input::placeholder{

      color:#cbd5e1;

    }

    .task-input:focus{

      background:
      rgba(255,255,255,0.15);

      transform:scale(1.01);

    }

    /* ADD BUTTON */

    .add-btn{

      width:100%;

      border:none;

      padding:16px;

      border-radius:16px;

      background:
      linear-gradient(
        135deg,
        #3b82f6,
        #2563eb
      );

      color:white;

      font-size:16px;
      font-weight:bold;

      cursor:pointer;

      transition:0.3s;

      position:relative;

      overflow:hidden;

    }

    .add-btn:hover{

      transform:translateY(-2px);

      box-shadow:
      0 10px 20px rgba(37,99,235,0.4);

    }

    .add-btn:active{

      transform:scale(0.95);

    }

    /* LOADER */

    .loader{

      width:22px;
      height:22px;

      border:3px solid rgba(255,255,255,0.3);

      border-top:3px solid white;

      border-radius:50%;

      animation:spin 0.8s linear infinite;

      display:none;

      margin:auto;

    }

    @keyframes spin{

      from{
        transform:rotate(0deg);
      }

      to{
        transform:rotate(360deg);
      }

    }

    /* STATS */

    .stats{

      display:flex;

      justify-content:space-between;

      flex-wrap:wrap;

      gap:10px;

      margin-bottom:18px;

      font-size:14px;

      color:#dbeafe;

    }

    /* TASK LIST */

    .task-list{

      list-style:none;

      display:flex;

      flex-direction:column;

      gap:14px;

      max-height:55vh;

      overflow-y:auto;

      padding-right:3px;

    }

    .task-list::-webkit-scrollbar{

      width:4px;

    }

    .task-list::-webkit-scrollbar-thumb{

      background:#3b82f6;

      border-radius:20px;

    }

    /* TASK ITEM */

    .task-item{

      background:
      rgba(255,255,255,0.08);

      border-radius:18px;

      padding:16px;

      display:flex;

      flex-direction:column;

      gap:14px;

      animation:slideIn 0.35s ease;

      transition:0.3s;

    }

    .task-item:hover{

      background:
      rgba(255,255,255,0.12);

    }

    @keyframes slideIn{

      from{

        opacity:0;

        transform:translateY(12px);

      }

      to{

        opacity:1;

        transform:translateY(0);

      }

    }

    .task-text{

      font-size:16px;

      line-height:1.5;

      word-wrap:break-word;

    }

    .completed{

      text-decoration:line-through;

      opacity:0.5;

    }

    /* ACTIONS */

    .task-actions{

      display:flex;

      gap:10px;

      width:100%;

    }

    .done-btn,
    .delete-btn{

      flex:1;

      border:none;

      padding:13px;

      border-radius:14px;

      color:white;

      font-weight:bold;

      cursor:pointer;

      transition:0.3s;

      font-size:14px;

    }

    .done-btn{

      background:
      linear-gradient(
        135deg,
        #10b981,
        #059669
      );

    }

    .delete-btn{

      background:
      linear-gradient(
        135deg,
        #ef4444,
        #dc2626
      );

    }

    .done-btn:hover,
    .delete-btn:hover{

      transform:scale(1.03);

    }

    .done-btn:active,
    .delete-btn:active{

      transform:scale(0.94);

    }

    /* EMPTY */

    .empty-msg{

      text-align:center;

      color:#cbd5e1;

      padding:20px 10px;

      font-size:15px;

    }

    /* DESKTOP */

    @media(min-width:768px){

      .todo-app{

        padding:28px;

      }

      .input-area{

        flex-direction:row;

      }

      .add-btn{

        width:160px;

      }

      .task-item{

        flex-direction:row;

        justify-content:space-between;

        align-items:center;

      }

      .task-actions{

        width:auto;

      }

      .done-btn,
      .delete-btn{

        width:110px;

      }

    }

  </style>

</head>

<body>

  <div class="bg-blur"></div>

  <div class="todo-app">

    <!-- INSTALL BUTTON -->

    <button
      id="installBtn"
      class="install-btn"
    >
      ⬇ Install
    </button>

    <!-- TITLE -->

    <h1 class="title">
      To-Do List
    </h1>

    <!-- INPUT -->

    <div class="input-area">

      <input
        type="text"
        id="taskInput"
        class="task-input"
        placeholder="Enter your task..."
      />

      <button
        class="add-btn"
        id="addBtn"
      >

        <span id="btnText">
          Add Task
        </span>

        <div
          class="loader"
          id="loader"
        ></div>

      </button>

    </div>

    <!-- STATS -->

    <div class="stats">

      <span id="totalTasks">
        Total: 0
      </span>

      <span id="completedTasks">
        Completed: 0
      </span>

    </div>

    <!-- TASKS -->

    <ul
      class="task-list"
      id="taskList"
    ></ul>

    <!-- EMPTY -->

    <div
      class="empty-msg"
      id="emptyMsg"
    >
      No tasks available.
    </div>

  </div>

  <script>

    // ELEMENTS

    const taskInput =
    document.getElementById("taskInput");

    const addBtn =
    document.getElementById("addBtn");

    const taskList =
    document.getElementById("taskList");

    const loader =
    document.getElementById("loader");

    const btnText =
    document.getElementById("btnText");

    const emptyMsg =
    document.getElementById("emptyMsg");

    const totalTasks =
    document.getElementById("totalTasks");

    const completedTasks =
    document.getElementById("completedTasks");

    const installBtn =
    document.getElementById("installBtn");

    // LOCAL STORAGE

    let tasks =
    JSON.parse(
      localStorage.getItem("todo_tasks")
    ) || [];

    // SAVE TASKS

    function saveTasks(){

      localStorage.setItem(
        "todo_tasks",
        JSON.stringify(tasks)
      );

    }

    // UPDATE STATS

    function updateStats(){

      totalTasks.innerText =
      `Total: ${tasks.length}`;

      const completed =
      tasks.filter(
        task => task.completed
      ).length;

      completedTasks.innerText =
      `Completed: ${completed}`;

    }

    // RENDER TASKS

    function renderTasks(){

      taskList.innerHTML = "";

      if(tasks.length === 0){

        emptyMsg.style.display =
        "block";

      }else{

        emptyMsg.style.display =
        "none";

      }

      tasks.forEach((task,index)=>{

        const li =
        document.createElement("li");

        li.className = "task-item";

        li.innerHTML = `

          <div class="task-text ${task.completed ? 'completed' : ''}">
            ${task.text}
          </div>

          <div class="task-actions">

            <button class="done-btn">

              ${task.completed ? 'Undo' : 'Done'}

            </button>

            <button class="delete-btn">

              Delete

            </button>

          </div>

        `;

        // DONE

        li.querySelector(".done-btn")
        .addEventListener("click",()=>{

          tasks[index].completed =
          !tasks[index].completed;

          saveTasks();

          renderTasks();

        });

        // DELETE

        li.querySelector(".delete-btn")
        .addEventListener("click",()=>{

          li.style.opacity = "0";

          li.style.transform =
          "translateX(80px)";

          setTimeout(()=>{

            tasks.splice(index,1);

            saveTasks();

            renderTasks();

          },250);

        });

        taskList.appendChild(li);

      });

      updateStats();

    }

    // ADD TASK

    function addTask(){

      const text =
      taskInput.value.trim();

      if(text === ""){

        taskInput.style.border =
        "2px solid red";

        setTimeout(()=>{

          taskInput.style.border =
          "none";

        },1000);

        return;

      }

      // SHOW LOADER

      loader.style.display = "block";

      btnText.style.display = "none";

      setTimeout(()=>{

        tasks.unshift({

          text:text,

          completed:false

        });

        saveTasks();

        renderTasks();

        taskInput.value = "";

        loader.style.display =
        "none";

        btnText.style.display =
        "block";

      },500);

    }

    // BUTTON CLICK

    addBtn.addEventListener(
      "click",
      addTask
    );

    // ENTER KEY

    taskInput.addEventListener(
      "keypress",
      (e)=>{

        if(e.key === "Enter"){

          addTask();

        }

      }
    );

    // INITIAL RENDER

    renderTasks();

    // SERVICE WORKER

    if("serviceWorker" in navigator){

      window.addEventListener(
        "load",
        ()=>{

          navigator.serviceWorker
          .register("/service-worker.js")
          .then(()=>{

            console.log(
              "Service Worker Registered"
            );

          })
          .catch((error)=>{

            console.log(
              "SW Failed:",
              error
            );

          });

        }
      );

    }

    // INSTALL BUTTON

    let deferredPrompt;

    window.addEventListener(
      "beforeinstallprompt",
      (e)=>{

        e.preventDefault();

        deferredPrompt = e;

        installBtn.style.display =
        "block";

      }
    );

    // INSTALL CLICK

    installBtn.addEventListener(
      "click",
      async ()=>{

        if(!deferredPrompt) return;

        deferredPrompt.prompt();

        const result =
        await deferredPrompt.userChoice;

        if(result.outcome === "accepted"){

          console.log("Installed");

        }

        deferredPrompt = null;

        installBtn.style.display =
        "none";

      }
    );

    // AFTER INSTALL

    window.addEventListener(
      "appinstalled",
      ()=>{

        installBtn.style.display =
        "none";

        console.log("PWA Installed");

      }
    );

  </script>

</body>
</html>
